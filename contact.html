<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nexus</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="icon" href="Nexusnobg.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Sixtyfour+Convergence&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="contact.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="Nexus.png" alt="Nexus Logo" class="nexus-logo">
                <h1 class="logo-text">N£⦻u$</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                    <li><a href="ireadyai.html">iReadyAI</a></li>
                </ul>
            </nav>
        </header>

        <section class="contact-section">
            <h2>Contact Us</h2>
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    <p>Have any inquiries or need help? We are always here for you.</p>
                    <ul>
                        <li>Email: <a href="mailto:nexus.hecker@gmail.com">nexus.hecker@gmail.com</a></li>
                        <li>Follow us: 
                            <a href="https://www.youtube.com/@NexusHackers">Youtube</a> | 
                            <a href="https://github.com/NexusHackers">GitHub</a>
                        </li>
                    </ul>
                </div>

                <div class="contact-form">
                    <h3>Send Us a Message</h3>
                    <form id="contact-form">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                    <p id="form-message"></p>                
                </div>
            </div>
        </section>
    </div>
</body>
</html>
